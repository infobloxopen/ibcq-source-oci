name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
      - run: go build ./...
      - run: go test ./client/ ./internal/... ./resources/ -v -timeout 60s

  e2e-oci:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin crane

      - name: Create k3d cluster with Docker Registry
        run: |
          k3d cluster create oci-e2e \
            -p "30004:30004@server:0" \
            --k3s-arg "--disable=traefik@server:0" \
            --wait
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

          kubectl apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: docker-registry
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: docker-registry
            template:
              metadata:
                labels:
                  app: docker-registry
              spec:
                containers:
                - name: registry
                  image: registry:2
                  ports:
                  - containerPort: 5000
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: docker-registry
          spec:
            type: NodePort
            selector:
              app: docker-registry
            ports:
            - port: 5000
              targetPort: 5000
              nodePort: 30004
          EOF
          kubectl rollout status deployment/docker-registry --timeout=120s

      - name: Push test images
        run: |
          crane copy docker.io/library/alpine:3.19 localhost:30004/test/alpine:v1 --insecure
          crane copy docker.io/library/alpine:3.19 localhost:30004/test/alpine:v2 --insecure
          crane copy docker.io/library/nginx:1.25-alpine localhost:30004/test/nginx:latest --insecure
          crane copy --platform linux/amd64 docker.io/library/alpine:3.19 localhost:30004/edge/singleplat:v1 --insecure
          crane copy --platform linux/amd64 docker.io/library/alpine:3.19 localhost:30004/edge/multitag:latest --insecure
          crane copy --platform linux/amd64 docker.io/library/alpine:3.19 localhost:30004/edge/multitag:stable --insecure
          crane copy --platform linux/amd64 docker.io/library/alpine:3.19 localhost:30004/edge/multitag:v3.19 --insecure
          crane copy --platform linux/amd64 docker.io/library/alpine:3.19 localhost:30004/org/team/project/deep-image:v1 --insecure

      - name: Push labeled image
        run: |
          cat > /tmp/Dockerfile <<'EOF'
          FROM alpine:3.19
          LABEL org.opencontainers.image.title="labeled-test"
          LABEL org.opencontainers.image.version="1.0.0"
          LABEL com.example.maintainer="test@example.com"
          LABEL com.example.description="An image with custom labels for testing"
          EOF
          docker build -t localhost:30004/edge/labeled:v1 -f /tmp/Dockerfile /tmp
          docker push localhost:30004/edge/labeled:v1

      - name: Push Helm chart
        run: |
          mkdir -p /tmp/test-chart/templates
          cat > /tmp/test-chart/Chart.yaml <<'EOF'
          apiVersion: v2
          name: test-chart
          description: A test Helm chart
          version: 0.1.0
          type: application
          EOF
          echo 'apiVersion: v1' > /tmp/test-chart/templates/cm.yaml
          helm package /tmp/test-chart -d /tmp
          helm push /tmp/test-chart-0.1.0.tgz oci://localhost:30004/edge

      - name: Start second registry
        run: |
          docker run -d --name second-registry -p 30005:5000 registry:2
          sleep 2
          crane copy docker.io/library/busybox:1.36 localhost:30005/test/busybox:v1 --insecure

      - name: Run OCI e2e tests
        run: |
          go test ./tests/e2e/ -v -run 'TestDockerRegistry|TestSingle|TestImage|TestMultiTag|TestNonexistent|TestEmpty|TestDeep|TestHelm|TestSingleTable|TestMixed|TestInvalid|TestUnreachable|TestContext' -timeout 300s

      - name: Cleanup
        if: always()
        run: |
          docker rm -f second-registry 2>/dev/null || true
          k3d cluster delete oci-e2e 2>/dev/null || true

  e2e-harbor:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin crane

      - name: Deploy Harbor in k3d
        run: |
          k3d cluster create harbor-e2e \
            -p "30080:30080@server:0" \
            --k3s-arg "--disable=traefik@server:0" \
            --wait
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

          kubectl create namespace harbor
          helm repo add harbor https://helm.goharbor.io
          helm repo update harbor

          helm upgrade --install harbor harbor/harbor \
            --namespace harbor \
            --set expose.type=nodePort \
            --set "expose.nodePort.ports.http.nodePort=30080" \
            --set expose.tls.enabled=false \
            --set externalURL="http://localhost:30080" \
            --set harborAdminPassword=Harbor12345 \
            --set persistence.enabled=false \
            --set trivy.enabled=false \
            --wait --timeout=600s

      - name: Wait for Harbor health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:30080/api/v2.0/health && exit 0
            sleep 5
          done
          echo "Harbor not healthy"
          kubectl -n harbor get pods
          exit 1

      - name: Run Harbor e2e tests
        run: |
          go test ./tests/e2e/ -v -run 'TestHarbor_' -timeout 300s
        env:
          HARBOR_ENDPOINT: http://localhost:30080

      - name: Cleanup
        if: always()
        run: k3d cluster delete harbor-e2e 2>/dev/null || true
