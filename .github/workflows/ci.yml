name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: go1.26.1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          DIFF=$(gofmt -l .)
          if [ -n "$DIFF" ]; then
            echo "gofmt needed on:"
            echo "$DIFF"
            exit 1
          fi

      - name: go fix check
        run: |
          OUTPUT=$(go fix ./... 2>&1)
          if [ -n "$OUTPUT" ]; then
            echo "go fix made changes:"
            echo "$OUTPUT"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -v -count=1 -race ./client/... ./internal/... ./plugin/... ./resources/...
