name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write

env:
  GOTOOLCHAIN: go1.26.1
  IMAGE: ghcr.io/infobloxopen/cq-source-oci

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          DIFF=$(gofmt -l .)
          if [ -n "$DIFF" ]; then
            echo "gofmt needed on:"
            echo "$DIFF"
            exit 1
          fi

      - name: go fix check
        run: |
          go fix ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "go fix made changes to:"
            git diff --name-only
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -v -count=1 -race ./client/... ./internal/... ./plugin/... ./resources/...

  build-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Container Image

            ```
            docker pull ${{ env.IMAGE }}:${{ github.ref_name }}
            ```

            **Digest:** `${{ needs.build-push.outputs.digest }}`
            **Platforms:** `linux/amd64`, `linux/arm64`

            ### Quick Start

            ```
            docker run --rm -p 7777:7777 ${{ env.IMAGE }}:${{ github.ref_name }}
            ```
